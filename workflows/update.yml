name: Update GitHub Universe Data

on:
  # Run every Sunday at 02:00 UTC
  schedule:
    - cron: "0 2 * * 0"

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      countries:
        description: "Comma-separated country codes to scrape (leave empty for all)"
        required: false
        default: ""
      top_cities:
        description: "Cities per country"
        required: false
        default: "6"
      top_repos:
        description: "Repos per city"
        required: false
        default: "20"
      resume:
        description: "Resume from last interrupted run (true/false)"
        required: false
        default: "false"

jobs:
  scrape:
    name: Scrape GitHub public repos
    runs-on: ubuntu-latest
    timeout-minutes: 340   # 5h 40m — fits within 6h job limit

    permissions:
      contents: write       # needed to commit JSON files back

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      # ── Restore cached raw data (skip re-scraping done countries) ─────────
      - name: Restore raw data cache
        uses: actions/cache@v4
        with:
          path: data/raw
          key: raw-data-${{ github.run_id }}
          restore-keys: |
            raw-data-

      # ── Scrape ────────────────────────────────────────────────────────────
      - name: Run scraper
        env:
          GH_TOKEN: ${{ secrets.GH_SCRAPER_TOKEN }}
        run: |
          COUNTRIES_ARG=""
          if [ -n "${{ github.event.inputs.countries }}" ]; then
            COUNTRIES_ARG="--countries ${{ github.event.inputs.countries }}"
          fi

          RESUME_ARG=""
          if [ "${{ github.event.inputs.resume }}" = "true" ]; then
            RESUME_ARG="--resume"
          fi

          python scraper.py \
            --token "$GH_TOKEN" \
            $COUNTRIES_ARG \
            $RESUME_ARG \
            --workers 1

      # ── Build static JSON ─────────────────────────────────────────────────
      - name: Build static JSON
        run: |
          python build.py \
            --top-cities ${{ github.event.inputs.top_cities || '6' }} \
            --top-repos  ${{ github.event.inputs.top_repos  || '20' }}

      # ── Show stats ────────────────────────────────────────────────────────
      - name: Print summary
        run: |
          echo "=== index.json preview ==="
          python -c "
          import json
          d = json.load(open('data/index.json'))
          print(f'Countries: {d[\"totalCountries\"]}')
          print(f'Repos:     {d[\"totalRepos\"]:,}')
          print(f'Stars:     {d[\"totalStars\"]:,}')
          print(f'Top lang:  {d[\"topLang\"]}')
          print(f'Built at:  {d[\"builtAt\"]}')
          "
          echo ""
          echo "=== File sizes ==="
          du -sh data/index.json data/countries/ 2>/dev/null || true
          echo "Total country files: $(ls data/countries/*.json 2>/dev/null | wc -l)"

      # ── Commit results back to repo ───────────────────────────────────────
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            COUNTRIES_BUILT=$(ls data/countries/*.json 2>/dev/null | wc -l)
            git commit -m "data: update universe snapshot — ${COUNTRIES_BUILT} countries [${TIMESTAMP}]"
            git push
          fi

      # ── Upload scraper log as artifact ────────────────────────────────────
      - name: Upload scraper log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-log-${{ github.run_id }}
          path: scraper.log
          retention-days: 30
