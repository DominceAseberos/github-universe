<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="GitHub Universe favicon">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="68%">
      <stop offset="0%" stop-color="#0f1c4f"/>
      <stop offset="58%" stop-color="#090f2f"/>
      <stop offset="100%" stop-color="#040716"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#9bd7ff" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#5ea7ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#66c2ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <ellipse cx="32" cy="32" rx="23" ry="9.8" fill="url(#glow)" filter="url(#soft)"/>

  <g transform="translate(32 32) rotate(-14)">
    <ellipse rx="20" ry="7" fill="none" stroke="url(#ring)" stroke-width="2.1"/>
    <ellipse rx="14" ry="4.9" fill="none" stroke="#7dd3fc" stroke-opacity="0.8" stroke-width="1.3"/>
    <ellipse rx="9.2" ry="3.1" fill="none" stroke="#d8b4fe" stroke-opacity="0.82" stroke-width="1.1"/>
  </g>

  <circle cx="32" cy="32" r="3.8" fill="#ffffff"/>
  <circle cx="32" cy="32" r="2.3" fill="#a5b4fc"/>

  <circle cx="13" cy="18" r="1.2" fill="#22d3ee"/>
  <circle cx="49" cy="16" r="1.05" fill="#f472b6"/>
  <circle cx="50" cy="45" r="1.1" fill="#34d399"/>
  <circle cx="15" cy="46" r="1" fill="#facc15"/>
</svg>
